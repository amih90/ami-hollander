<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="b1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="120"/>
    </filter>
    <filter id="b2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="b3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <linearGradient id="streak" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a84c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e07c9a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#e07c9a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Deep luxury base -->
  <rect width="100%" height="100%" fill="#06060e"/>

  <!-- Large ambient orbs -->
  <ellipse cx="250" cy="180" rx="500" ry="400" fill="url(#glow1)" filter="url(#b1)"/>
  <ellipse cx="1650" cy="350" rx="450" ry="380" fill="url(#glow2)" filter="url(#b1)"/>
  <ellipse cx="960" cy="850" rx="550" ry="350" fill="url(#glow3)" filter="url(#b1)"/>
  <ellipse cx="1300" cy="80" rx="380" ry="300" fill="url(#glow4)" filter="url(#b1)"/>
  <ellipse cx="500" cy="650" rx="300" ry="250" fill="url(#glow5)" filter="url(#b2)"/>

  <!-- Diagonal light streak across center -->
  <rect x="-200" y="480" width="2400" height="120" fill="url(#streak)" transform="rotate(-8 960 540)" filter="url(#b2)"/>

  <!-- Secondary subtle light streak -->
  <rect x="-200" y="200" width="2400" height="60" fill="url(#streak)" opacity="0.4" transform="rotate(5 960 540)" filter="url(#b2)"/>

  <!-- Small bokeh highlights -->
  <circle cx="400" cy="300" r="80" fill="#c9a84c" opacity="0.04" filter="url(#b3)"/>
  <circle cx="1500" cy="200" r="60" fill="#e07c9a" opacity="0.05" filter="url(#b3)"/>
  <circle cx="800" cy="700" r="70" fill="#a78bfa" opacity="0.04" filter="url(#b3)"/>
  <circle cx="1100" cy="500" r="50" fill="#3b82f6" opacity="0.06" filter="url(#b3)"/>
  <circle cx="300" cy="800" r="90" fill="#6ee7b7" opacity="0.03" filter="url(#b3)"/>
  <circle cx="1700" cy="700" r="70" fill="#c9a84c" opacity="0.05" filter="url(#b3)"/>

  <!-- Top vignette -->
  <rect width="100%" height="100%" fill="url(#vignette)" opacity="0.5"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#06060e"/>
    </radialGradient>
  </defs>
</svg>
